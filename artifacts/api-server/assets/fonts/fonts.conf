<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  Bundled fontconfig for card/profile/welcome-card SVG rendering (via
  sharp -> libvips -> librsvg -> pango -> fontconfig).

  Why this exists: neither of this project's deploy targets (Render's
  buildCommand, replit.nix) installs ANY fonts, and every SVG-rendering
  code path in src/bot/{commands,handlers} asks for "Arial, Helvetica,
  sans-serif" — fonts that don't exist on a bare Node image. With no
  matching font at all, librsvg has nothing to draw glyphs with, which is
  what produced literal boxed Unicode codepoints (tofu glyphs, e.g.
  "01F4B0") instead of rendered text/emoji in profile cards, welcome
  cards, and card-spawn images.

  This ships DejaVu Sans (Regular + Bold) directly in the repo — full
  Latin Extended coverage (handles accented text like "Más fuerte" that
  Arial-only setups can't render at all) — and remaps every "Arial" /
  "Helvetica" / "sans-serif" family request to it, so rendering is
  identical regardless of what fonts (if any) happen to be on the host.

  NOTE ON EMOJI: this does NOT fix color emoji (💰🏦❤️ etc.) inside SVG
  <text> — that's a separate, harder limitation. cairo's SVG backend
  (which librsvg renders through) does not support color emoji fonts at
  all, so even with a color emoji font installed, the glyph is silently
  dropped rather than drawn. The actual fix for that is to stop putting
  emoji inside SVG <text> in these renders — see the emoji-svg-icons.ts
  helper, which the affected files were updated to use instead.
-->
<fontconfig>
  <dir prefix="relative">.</dir>
  <cachedir>/tmp/fontconfig-cache</cachedir>

  <match target="pattern">
    <test qual="any" name="family"><string>Arial</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>DejaVu Sans</string></edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family"><string>Helvetica</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>DejaVu Sans</string></edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family"><string>sans-serif</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>DejaVu Sans</string></edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family"><string>Georgia</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>DejaVu Sans</string></edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family"><string>serif</string></test>
    <edit name="family" mode="prepend" binding="strong"><string>DejaVu Sans</string></edit>
  </match>

  <!-- Default fallback for anything not explicitly matched above -->
  <alias>
    <family>sans-serif</family>
    <prefer><family>DejaVu Sans</family></prefer>
  </alias>
</fontconfig>
