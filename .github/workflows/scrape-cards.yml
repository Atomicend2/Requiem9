name: Scrape Shoob Cards

on:
  workflow_dispatch:
  schedule:
    # Run weekly on Sunday at 2am UTC to keep cards fresh
    - cron: '0 2 * * 0'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetch full history so push doesn't get rejected
          fetch-depth: 0

      - name: Configure git credentials
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Use GITHUB_TOKEN for authenticated push
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --ignore-scripts
        working-directory: artifacts/api-server

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
        working-directory: artifacts/api-server

      - name: Run scraper (metadata only — no images)
        run: node scraper-runner.mjs
        working-directory: artifacts/api-server
        env:
          SHOOB_SYNC_ONLY: 'true'
          CARDS_OUTPUT: '../../cards.json'
          # Pass token so scraper can also push if needed
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
